<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aether Blade: Crimson Horizon</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #030712; color: #f8fafc; font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; display: flex; align-items: center; justify-content: center; }
        #gameContainer { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 850px; background: #000; overflow: hidden; box-shadow: 0 0 60px rgba(168, 85, 247, 0.2); }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px; z-index: 5; }
        .top-hud { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .hud-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(168, 85, 247, 0.3); padding: 8px 14px; border-radius: 12px; font-weight: 800; font-size: 13px; letter-spacing: 1px; color: #c084fc; display: flex; align-items: center; gap: 6px; }
        .charge-meter-container { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 20px; height: 8px; overflow: hidden; margin-top: 10px; }
        .charge-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #a855f7, #6366f1); transition: width 0.05s linear; }
        .boss-bar-container { width: 100%; background: rgba(0,0,0,0.7); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 6px; height: 10px; overflow: hidden; margin-top: 8px; display: none; }
        .boss-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #dc2626); }
        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 30px; text-align: center; cursor: pointer; pointer-events: auto; }
        .menu-title { font-size: 32px; font-weight: 900; margin-bottom: 4px; background: linear-gradient(135deg, #ffffff, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .menu-sub { font-size: 11px; color: #94a3b8; margin-bottom: 35px; letter-spacing: 3px; font-weight: bold; }
        .tap-zone { background: linear-gradient(135deg, #a855f7, #4f46e5); color: white; padding: 16px 32px; border-radius: 14px; font-weight: 900; font-size: 16px; letter-spacing: 1px; width: 240px; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4); animation: pulseGlow 2.5s infinite ease-in-out; }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 4px 30px rgba(168, 85, 247, 0.7); } }
        .hint-text { color: #64748b; font-size: 11px; margin-top: 40px; max-width: 280px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div>
            <div class="top-hud">
                <div class="hud-card" id="lvlDisplay">✨ ZONE 1</div>
                <div class="hud-card" id="scoreDisplay">🔮 0</div>
            </div>
            <div class="charge-meter-container">
                <div class="charge-bar" id="chargeBar"></div>
            </div>
        </div>
        <div class="boss-bar-container" id="bossBarHost">
            <div class="boss-bar" id="bossBar"></div>
        </div>
    </div>

    <div class="screen-overlay" id="menuOverlay">
        <div class="menu-title">AETHER BLADE</div>
        <div class="menu-sub">CRIMSON HORIZON</div>
        <div class="tap-zone">ENTER BEAUTIFUL SPACE</div>
        <div class="hint-text">💡 Hold down your finger to automatically fire. Keep holding down to charge up and automatically unleash the massive Solar Beam Super Attack!</div>
    </div>
</div>

<script>
// --- SOUNDSCAPE ENGINE (PEACEFUL & SOFT) ---
const AudioEngine = {
    ctx: null,
    isPlaying: false,
    step: 0,
    intervalId: null,
    
    init() {
        if (this.ctx) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
    },
    
    playSoftNode(freq, duration, vol, type = 'sine') {
        if (!this.ctx || !this.isPlaying) return;
        try {
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            
            // Ultra soft attack and long fade out to remain soothing
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        } catch(e){}
    },
    
    startAmbientAmbient() {
        this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.isPlaying = true;
        
        // Peaceful minor pentatonic notes (A-chord progressions)
        const notes = [220.00, 261.63, 293.66, 329.63, 392.00, 440.00];
        
        this.intervalId = setInterval(() => {
            if (!this.isPlaying) return;
            
            // Soft base pad pulse
            if (this.step % 4 === 0) {
                this.playSoftNode(notes[this.step % 3] / 2, 1.5, 0.04, 'sine');
            }
            
            // Soft melodic high bell notes
            if (this.step % 2 === 0 && Math.random() > 0.3) {
                let randomNote = notes[Math.floor(Math.random() * notes.length)];
                this.playSoftNode(randomNote, 0.8, 0.02, 'sine');
            }
            
            this.step++;
        }, 600); // Super slow tempo, calming rhythm
    },
    
    playSuperLaserSound() {
        if (!this.ctx) return;
        try {
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            osc.type = 'triangle'; // Smooth but clear presence
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.4);
            
            gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.5);
        } catch(e){}
    },

    stop() {
        if (this.intervalId) clearInterval(this.intervalId);
        this.isPlaying = false;
    }
};

// --- CORE GAME ENGINE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const state = {
    running: false,
    level: 1,
    score: 0,
    frame: 0,
    touchActive: false
};

const player = {
    x: 0, y: 0, radius: 16,
    targetX: 0, targetY: 0,
    charge: 0, fireCooldown: 0,
    superLaserActive: 0
};

const entities = {
    enemies: [],
    lasers: [],
    particles: [],
    stars: [],
    activeBoss: null
};

// Background Generation
for(let i=0; i<35; i++) {
    entities.stars.push({ x: Math.random() * 450, y: Math.random() * 850, size: Math.random() * 2 + 0.5, speed: Math.random() * 0.5 + 0.2 });
}

function resize() {
    const container = document.getElementById('gameContainer');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    if(!state.running) {
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.75;
        player.targetX = player.x;
        player.targetY = player.y;
    }
}
window.addEventListener('resize', resize);
resize();

// --- INPUT LISTENERS ---
const overlay = document.getElementById('menuOverlay');
overlay.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!state.running) {
        state.running = true;
        state.level = 1;
        state.score = 0;
        player.charge = 0;
        entities.enemies = [];
        entities.lasers = [];
        entities.particles = [];
        entities.activeBoss = null;
        overlay.style.display = 'none';
        AudioEngine.startAmbientAmbient();
    }
}, {passive: false});

canvas.addEventListener('touchstart', (e) => { state.touchActive = true; updateInput(e.touches[0]); });
canvas.addEventListener('touchmove', (e) => { updateInput(e.touches[0]); });
canvas.addEventListener('touchend', () => { state.touchActive = false; });

function updateInput(touch) {
    const rect = canvas.getBoundingClientRect();
    player.targetX = touch.clientX - rect.left;
    player.targetY = touch.clientY - rect.top;
}

function spawnExplosion(x, y, color, count = 8) {
    for(let i=0; i<count; i++) {
        entities.particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 1,
            alpha: 1,
            color: color
        });
    }
}

function triggerGameOver() {
    state.running = false;
    AudioEngine.stop();
    overlay.style.display = 'flex';
    document.querySelector('.menu-title').innerText = "HORIZON LOST";
    document.querySelector('.tap-zone').innerText = "RE-ENTER ARENA";
}

// --- RENDER FUNCTIONS ---
function drawPlayer(x, y, r) {
    ctx.save();
    // Glowing beautiful aura
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#a855f7';
    
    // Sleek fighter design
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(x, y - r - 4);
    ctx.lineTo(x + r, y + r);
    ctx.lineTo(x, y + r/2);
    ctx.lineTo(x - r, y + r);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawEnemy(x, y, size, isBoss) {
    ctx.save();
    ctx.shadowBlur = isBoss ? 20 : 8;
    ctx.shadowColor = isBoss ? '#ef4444' : '#6366f1';
    ctx.fillStyle = isBoss ? '#ef4444' : '#818cf8';
    
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// --- CORE MECHANICS LOOP ---
function coreLoop() {
    state.frame++;
    
    // Clear viewport gently to leave trails
    ctx.fillStyle = 'rgba(3, 7, 18, 0.25)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw Ambient Starfield
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    entities.stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += s.speed;
        if(s.y > canvas.height) s.y = -5;
    });

    if (state.running) {
        document.getElementById('lvlDisplay').innerText = `✨ ZONE ${state.level}`;
        document.getElementById('scoreDisplay').innerText = `🔮 ${state.score}`;
        
        // Handle coordinates smoothing
        player.x += (player.targetX - player.x) * 0.15;
        player.y += (player.targetY - player.y) * 0.15;
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        
        // Charge Logic & Super Weapon Loop
        if (state.touchActive && player.superLaserActive <= 0) {
            player.charge = Math.min(player.charge + 0.6, 100);
            if(player.charge >= 100) {
                player.superLaserActive = 45; // Super Beam duration length
                player.charge = 0;
                AudioEngine.playSuperLaserSound();
            }
        } else if(!state.touchActive) {
            player.charge = Math.max(player.charge - 1, 0);
        }
        document.getElementById('chargeBar').style.width = `${player.charge}%`;
        
        // Regular Auto Fire System
        player.fireCooldown--;
        if (state.touchActive && player.fireCooldown <= 0 && player.superLaserActive <= 0) {
            entities.lasers.push({ x: player.x, y: player.y - 10, vy: -14, w: 4, h: 12 });
            AudioEngine.playSoftNode(523.25, 0.05, 0.01, 'sine');
            player.fireCooldown = 8;
        }
        
        // Trigger Super Attack Visual
        if (player.superLaserActive > 0) {
            player.superLaserActive--;
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#c084fc';
            
            // Giant vertical energy beam
            let beamWidth = 50 + Math.random() * 15;
            let gradient = ctx.createLinearGradient(player.x - beamWidth/2, 0, player.x + beamWidth/2, 0);
            gradient.addColorStop(0, 'rgba(168, 85, 247, 0.2)');
            gradient.addColorStop(0.3, '#c084fc');
            gradient.addColorStop(0.5, '#ffffff');
            gradient.addColorStop(0.7, '#c084fc');
            gradient.addColorStop(1, 'rgba(168, 85, 247, 0.2)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(player.x - beamWidth/2, 0, beamWidth, player.y - 10);
            ctx.restore();
            
            // Mega Laser Collision execution check
            entities.enemies.forEach((e) => {
                if(Math.abs(e.x - player.x) < beamWidth/2 + e.size && e.y < player.y) {
                    e.hp = 0; // Destroy immediately
                }
            });
            if(entities.activeBoss) {
                if(Math.abs(entities.activeBoss.x - player.x) < beamWidth/2 + entities.activeBoss.size) {
                    entities.activeBoss.hp -= 0.4;
                }
            }
        }
        
        drawPlayer(player.x, player.y, player.radius);
        
        // Handle Enemies Spawning Metrics
        if (!entities.activeBoss && state.frame % Math.max(20, 50 - state.level * 4) === 0) {
            entities.enemies.push({
                x: Math.random() * (canvas.width - 40) + 20, y: -20,
                size: 12 + Math.random() * 6,
                speed: 1.8 + Math.random() * 1.5 + (state.level * 0.3),
                hp: 1
            });
        }
        
        // Boss Spawn Activation Blueprint
        if (state.score > 0 && state.score % 20 === 0 && !entities.activeBoss) {
            entities.enemies = [];
            entities.activeBoss = {
                x: canvas.width / 2, y: -50, targetX: canvas.width / 2, targetY: 120,
                size: 32, hp: 25 + state.level * 10, maxHp: 25 + state.level * 10
            };
            document.getElementById('bossBarHost').style.display = 'block';
        }
        
        // Render & Track Enemies Execution
        for (let i = entities.enemies.length - 1; i >= 0; i--) {
            let e = entities.enemies[i];
            e.y += e.speed;
            drawEnemy(e.x, e.y, e.size, false);
            
            if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.size) triggerGameOver();
            
            if (e.hp <= 0 || e.y > canvas.height + 30) {
                if(e.hp <= 0) { state.score++; spawnExplosion(e.x, e.y, '#818cf8'); }
                entities.enemies.splice(i, 1);
            }
        }
        
        // Render & Track Active Boss System
        if (entities.activeBoss) {
            let b = entities.activeBoss;
            b.x += (b.targetX - b.x) * 0.03;
            b.y += (b.targetY - b.y) * 0.03;
            if (state.frame % 100 === 0) {
                b.targetX = Math.random() * (canvas.width - 100) + 50;
                b.targetY = Math.random() * 120 + 60;
            }
            drawEnemy(b.x, b.y, b.size, true);
            document.getElementById('bossBar').style.width = `${(b.hp / b.maxHp) * 100}%`;
            
            if(state.frame % 50 === 0) {
                entities.enemies.push({ x: b.x, y: b.y + 15, size: 9, speed: 4.5, hp: 1 });
            }
            
            if (Math.hypot(player.x - b.x, player.y - b.y) < player.radius + b.size) triggerGameOver();
            
            if (b.hp <= 0) {
                spawnExplosion(b.x, b.y, '#ef4444', 25);
                entities.activeBoss = null;
                document.getElementById('bossBarHost').style.display = 'none';
                state.level++;
                state.score += 15;
            }
        }
        
        // Render Projectiles Engine
        for (let i = entities.lasers.length - 1; i >= 0; i--) {
            let l = entities.lasers[i];
            l.y += l.vy;
            ctx.fillStyle = '#a78bfa';
            ctx.fillRect(l.x - l.w/2, l.y, l.w, l.h);
            
            for(let j = entities.enemies.length - 1; j >= 0; j--) {
                let e = entities.enemies[j];
                if(Math.hypot(l.x - e.x, l.y - e.y) < e.size + 4) {
                    e.hp--;
                    entities.lasers.splice(i, 1);
                    break;
                }
            }
            
            if(entities.activeBoss && entities.lasers[i]) {
                let b = entities.activeBoss;
                if(Math.hypot(l.x - b.x, l.y - b.y) < b.size + 4) {
                    b.hp--;
                    entities.lasers.splice(i, 1);
                }
            }
            if(l && l.y < -25) entities.lasers.splice(i, 1);
        }
        
        // Update Particle Simulations
        for(let i = entities.particles.length - 1; i >= 0; i--) {
            let p = entities.particles[i];
            p.x += p.vx; p.y += p.vy;
            p.alpha -= 0.03;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1.0;
            if(p.alpha <= 0) entities.particles.splice(i, 1);
        }
    }
    
    requestAnimationFrame(coreLoop);
}
coreLoop();
</script>
</body>
</html>

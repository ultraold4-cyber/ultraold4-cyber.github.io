<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 { margin: 10px 0 5px 0; font-size: 24px; color: #3b82f6; }
        #score { font-size: 18px; margin-bottom: 10px; }
        canvas {
            background: #1e293b;
            border: 4px solid #3b82f6;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-gap: 10px;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            text-align: center;
            user-select: none;
        }
        .btn:active { background: #1d4ed8; }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #down { grid-column: 2; }
        #right { grid-column: 3; }
    </style>
</head>
<body>

    <h1>SNAKE GAME</h1>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <!-- Mobile Screen Buttons -->
    <div class="controls">
        <button class="btn" id="up">↑</button>
        <button class="btn" id="left">←</button>
        <button class="btn" id="down">↓</button>
        <button class="btn" id="right">→</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 15;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameInterval;

        function gameLoop() {
            updateSnake();
            if (checkGameOver()) {
                alert("Game Over! Score: " + score);
                resetGame();
                return;
            }
            clearCanvas();
            drawFood();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#10b981"; // Snake color
            snake.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2));
        }

        function updateSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = "Score: " + score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function drawFood() {
            ctx.fillStyle = "#ef4444"; // Food color
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function checkGameOver() {
            const head = snake[0];
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1; dy = 0;
            score = 0;
            scoreElement.innerText = "Score: " + score;
            generateFood();
        }

        // Direction Controls
        function changeDirection(direction) {
            if (direction === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (direction === 'down' && dy === 0) { dx = 0; dy = 1; }
            if (direction === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (direction === 'right' && dx === 0) { dx = 1; dy = 0; }
        }

        document.getElementById('up').addEventListener('click', () => changeDirection('up'));
        document.getElementById('down').addEventListener('click', () => changeDirection('down'));
        document.getElementById('left').addEventListener('click', () => changeDirection('left'));
        document.getElementById('right').addEventListener('click', () => changeDirection('right'));

        resetGame();
        gameInterval = setInterval(gameLoop, 150);
    </script>
</body>
</html>

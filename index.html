<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swordigo Engine Test</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b1329; overflow: hidden; font-family: sans-serif; position: fixed; }
        #gameContainer { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 850px; margin: 0 auto; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .hud-layer { position: absolute; top: 15px; left: 15px; right: 15px; pointer-events: none; display: flex; justify-content: space-between; z-index: 10; }
        .vitals { display: flex; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 4px; }
        .hearts-row { color: #ef4444; font-size: 14px; }
        .mana-bar-container { width: 80px; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .mana-bar-fill { width: 100%; height: 100%; background: #3b82f6; }
        
        .controller-layer { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 10; pointer-events: none; }
        .dpad, .action-cluster { display: flex; gap: 10px; pointer-events: auto; }
        .control-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .control-btn:active { background: rgba(255,255,255,0.4); }

        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; text-align: center; }
        .action-start-btn { margin-top: 20px; background: #f59e0b; border: none; padding: 12px 35px; border-radius: 4px; font-weight: bold; color: black; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud-layer">
        <div class="vitals">
            <div class="hearts-row" id="heartsDisplay">❤️❤️❤️</div>
            <div class="mana-bar-container"><div class="mana-bar-fill" id="manaBar"></div></div>
        </div>
    </div>

    <div class="controller-layer">
        <div class="dpad">
            <div class="control-btn" id="ctrlLeft">◀</div>
            <div class="control-btn" id="ctrlRight">▶</div>
        </div>
        <div class="action-cluster">
            <div class="control-btn" id="ctrlAttack" style="background:rgba(239,68,68,0.3)">⚔️</div>
        </div>
    </div>

    <div class="screen-overlay" id="mainScreenOverlay">
        <h1 id="titleText" style="margin:0; color:#f59e0b;">SWORDIGO ALPHA</h1>
        <p style="color:#94a3b8; font-size:14px; padding:0 20px;">If this screen loads, the engine is healthy.</p>
        <button class="action-start-btn" id="startAdventureTrigger">TAP TO START</button>
    </div>
</div>

<script>
// Prevent crash if container width is initially 0
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

function resize() {
    canvas.width = container.clientWidth || window.innerWidth || 400;
    canvas.height = container.clientHeight || window.innerHeight || 600;
}
resize();
window.addEventListener('resize', resize);

const world = { width: 2000, groundY: canvas.height - 100 };
const camera = { x: 0 };
let gameActive = false;

const hero = {
    x: 100, y: 100, w: 24, h: 40, vx: 0, vy: 0,
    hp: 3, maxHp: 3, airborne: true, orientation: 'right', attackTime: 0
};

const mapPlatforms = [
    { x: 0, y: canvas.height - 100, w: 800, h: 100 },
    { x: 250, y: canvas.height - 180, w: 200, h: 20 },
    { x: 500, y: canvas.height - 260, w: 200, h: 20 },
    { x: 900, y: canvas.height - 100, w: 1000, h: 100 }
];

let monsters = [
    { x: 350, y: canvas.height - 126, w: 26, h: 26, vx: 1.5, minX: 260, maxX: 430 }
];

const activeInputs = { left: false, right: false };

// Safe input register function
function safeRegister(id, pressAction, releaseAction) {
    const btn = document.getElementById(id);
    if (!btn) return;
    
    // Mobile Touch
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); pressAction(); }, {passive:false});
    if (releaseAction) {
        btn.addEventListener('touchend', (e) => { e.preventDefault(); releaseAction(); }, {passive:false});
    }
    // Desktop Mouse Fallback
    btn.addEventListener('mousedown', () => { pressAction(); });
    if (releaseAction) {
        btn.addEventListener('mouseup', () => { releaseAction(); });
    }
}

safeRegister('ctrlLeft', () => { activeInputs.left = true; hero.orientation = 'left'; }, () => activeInputs.left = false);
safeRegister('ctrlRight', () => { activeInputs.right = true; hero.orientation = 'right'; }, () => activeInputs.right = false);

safeRegister('ctrlAttack', () => {
    if (!hero.airborne) {
        hero.vy = -12;
        hero.airborne = true;
    } else if (hero.attackTime === 0) {
        hero.attackTime = 12;
        // Hit check
        let reach = 35;
        let ax = hero.orientation === 'right' ? hero.x + hero.w : hero.x - reach;
        monsters.forEach(m => {
            if (ax < m.x + m.w && ax + reach > m.x && hero.y < m.y + m.h && hero.y + hero.h > m.y) {
                m.x += hero.orientation === 'right' ? 40 : -40; // Knockback
            }
        });
    }
});

const startBtn = document.getElementById('startAdventureTrigger');
if (startBtn) {
    startBtn.addEventListener('click', () => {
        const overlay = document.getElementById('mainScreenOverlay');
        if (overlay) overlay.style.display = 'none';
        
        // Reset player parameters safely
        hero.hp = 3;
        hero.x = 100;
        hero.y = 50;
        hero.vx = 0;
        hero.vy = 0;
        
        gameActive = true;
    });
}

function updateEngine() {
    if (gameActive) {
        // Movement Physics
        if (activeInputs.left) hero.vx = -3.5;
        else if (activeInputs.right) hero.vx = -(-3.5); // Safe +3.5 variable inversion override
        else hero.vx *= 0.7;

        hero.vy += 0.55; // Gravity
        hero.x += hero.vx;
        hero.y += hero.vy;

        // Boundaries
        if (hero.x < 0) hero.x = 0;
        if (hero.y > canvas.height + 40) {
            // Respawn
            hero.x = 100; hero.y = 50; hero.vx = 0; hero.vy = 0; hero.hp--;
        }

        // Platform Intersections
        hero.airborne = true;
        mapPlatforms.forEach(p => {
            if (hero.x < p.x + p.w && hero.x + hero.w > p.x && hero.y + hero.h > p.y && hero.y + hero.h - hero.vy <= p.y + 10) {
                hero.y = p.y - hero.h;
                hero.vy = 0;
                hero.airborne = false;
            }
        });

        if (hero.attackTime > 0) hero.attackTime--;

        // AI Loop
        monsters.forEach(m => {
            m.x += m.vx;
            if (m.x < m.minX || m.x > m.maxX) m.vx *= -1;
            
            // Player collision
            if (hero.x < m.x + m.w && hero.x + hero.w > m.x && hero.y < m.y + m.h && hero.y + hero.h > m.y) {
                hero.hp--;
                hero.x += hero.orientation === 'right' ? -40 : 40;
                hero.vy = -3;
            }
        });

        // Dynamic Camera Lock Tracking
        camera.x = hero.x - canvas.width / 2;
        if (camera.x < 0) camera.x = 0;
        if (camera.x > world.width - canvas.width) camera.x = world.width - canvas.width;

        if (hero.hp <= 0) {
            gameActive = false;
            const overlay = document.getElementById('mainScreenOverlay');
            const title = document.getElementById('titleText');
            if (overlay && title) {
                title.innerText = "GAME OVER";
                overlay.style.display = 'flex';
            }
        }
    }

    // Render Canvas Operations
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, 0);

    // Platforms
    ctx.fillStyle = '#334155';
    mapPlatforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    // Enemy
    ctx.fillStyle = '#a855f7';
    monsters.forEach(m => {
        ctx.fillRect(m.x, m.y, m.w, m.h);
    });

    // Hero Character Profile Block
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(hero.x, hero.y, hero.w, hero.h);

    // Swing Slashing Effects Overlay
    if (hero.attackTime > 0) {
        ctx.fillStyle = '#fef08a';
        ctx.fillRect(hero.orientation === 'right' ? hero.x + hero.w : hero.x - 25, hero.y + 12, 25, 12);
    }

    ctx.restore();

    // Safely refresh metrics HUD
    const heartsEl = document.getElementById('heartsDisplay');
    if (heartsEl) {
        let str = '';
        for(let i=0; i<hero.maxHp; i++) str += (i < hero.hp) ? '❤️' : '🖤';
        heartsEl.innerText = str;
    }

    requestAnimationFrame(updateEngine);
}

// Start master frame loop cycle
updateEngine();
</script>
</body>
</html>

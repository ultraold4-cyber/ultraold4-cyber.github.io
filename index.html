<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Splash Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 { 
            margin: 5px 0; 
            font-size: 28px; 
            background: linear-gradient(to right, #ec4899, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.3); 
        }
        #scoreBoard { 
            font-size: 18px; 
            margin-bottom: 10px; 
            display: flex; 
            gap: 20px;
            font-weight: bold;
            color: #e2e8f0;
        }
        canvas {
            background: #020617;
            border: 4px solid transparent;
            border-image: linear-gradient(to bottom right, #ec4899, #3b82f6) 1;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            max-width: 100%;
        }
        .instructions { 
            font-size: 13px; 
            color: #94a3b8; 
            margin-top: 12px; 
            text-align: center; 
            background: rgba(255,255,255,0.05);
            padding: 6px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>NEON SPLASH</h1>
    <div id="scoreBoard">
        <div id="score" style="color: #3b82f6;">Score: 0</div>
        <div id="highScore" style="color: #ec4899;">Best: 0</div>
    </div>
    
    <canvas id="gameCanvas" width="320" height="400"></canvas>
    <div class="instructions">Tap to bounce! Dynamic background music enabled 🎵</div>

    <!-- Background Music Stream Link -->
    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>


    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const bgMusic = document.getElementById("bgMusic");

        // Game Settings
        const gravity = 0.25;
        const jump = -4.8;
        const pipeWidth = 52;
        const pipeGap = 115;
        const pipeSpeed = 2.2;

        let birdY = 200;
        let birdVelocity = 0;
        let birdRadius = 11;
        let pipes = [];
        let score = 0;
        let highScore = localStorage.getItem("splashHighScore") || 0;
        let isGameOver = false;
        let frameCount = 0;
        let colorHue = 0;

        highScoreElement.innerText = "Best: " + highScore;

        function startNewGame() {
            birdY = 200;
            birdVelocity = 0;
            pipes = [];
            score = 0;
            isGameOver = false;
            frameCount = 0;
            colorHue = 0;
            scoreElement.innerText = "Score: 0";
            spawnPipe();
        }

        function spawnPipe() {
            let minHeight = 50;
            let maxHeight = canvas.height - pipeGap - minHeight;
            let topPipeHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            pipes.push({
                x: canvas.width,
                top: topPipeHeight,
                bottom: canvas.height - (topPipeHeight + pipeGap),
                passed: false
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            colorHue = (colorHue + 0.5) % 360;
            ctx.fillStyle = `hsl(${colorHue}, 40%, 6%)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            birdVelocity += gravity;
            birdY += birdVelocity;

            ctx.fillStyle = `hsl(${(colorHue + 180) % 360}, 90%, 65%)`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(50, birdY - birdRadius, birdRadius * 2, birdRadius * 2);
            ctx.shadowBlur = 0; 

            frameCount++;
            if (frameCount % 90 === 0) {
                spawnPipe();
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                ctx.fillStyle = `hsl(${(colorHue + 90) % 360}, 85%, 50%)`;
                ctx.fillRect(pipes[i].x, 0, pipeWidth, pipes[i].top);
                ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipeWidth, pipes[i].bottom);

                if (50 + birdRadius > pipes[i].x && 50 - birdRadius < pipes[i].x + pipeWidth) {
                    if (birdY - birdRadius < pipes[i].top || birdY + birdRadius > canvas.height - pipes[i].bottom) {
                        triggerCrash();
                    }
                }

                if (!pipes[i].passed && pipes[i].x < 50) {
                    pipes[i].passed = true;
                    score++;
                    scoreElement.innerText = "Score: " + score;
                }

                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            if (birdY + birdRadius >= canvas.height || birdY - birdRadius <= 0) {
                triggerCrash();
            }

            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        function triggerCrash() {
            if (!isGameOver) {
                // Softened Haptic Click (20ms instead of heavy rattle)
                if (navigator.vibrate) {
                    navigator.vibrate(20); 
                }
                endGame();
            }
        }

        function endGame() {
            isGameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("splashHighScore", highScore);
                highScoreElement.innerText = "Best: " + highScore;
            }
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 26px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = "14px sans-serif";
            ctx.fillStyle = "#cbd5e1";
            ctx.fillText("Tap anywhere to bounce again", canvas.width / 2, canvas.height / 2 + 20);
        }

        function handleInput(e) {
            e.preventDefault();
            
            // Modern browsers require user interaction before playing audio strings
            if (bgMusic.paused) {
                bgMusic.volume = 0.4; // Soft background volume balance
                bgMusic.play().catch(err => console.log("Audio waiting for touch activation"));
            }
            
            if (isGameOver) {
                startNewGame();
                requestAnimationFrame(gameLoop);
            } else {
                birdVelocity = jump;
            }
        }

        canvas.addEventListener("touchstart", handleInput);
        canvas.addEventListener("mousedown", handleInput);

        startNewGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>

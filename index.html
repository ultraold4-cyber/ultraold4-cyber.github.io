<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aether Blade</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #startBtn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #444; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <button id="startBtn">TAP TO START</button>
    <script>
        const btn = document.getElementById('startBtn');
        btn.onclick = () => {
            btn.style.display = 'none';
            console.log("Game Starting...");
            // Even if audio fails, the game logic will now continue
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
            } catch(e) { console.log("Audio skipped"); }
            // Game loop code would normally trigger here
            alert("Battle Started!"); 
        };
    </script>
</body>
</html>
